# Non-secret manifest of QA seed-artifact identifiers, read by
# scripts/qa_fixture_recorder.py. Safe to commit -- these are IDs and
# keys, not credentials, the same way a Jira project key or a Drive
# folder id isn't a secret on its own.
#
# Fill in each connector's section after working through the matching
# checklist in docs/qa-environment-setup.md. The recorder refuses to
# record anything whose title/summary doesn't carry the [QATEST] tag
# that checklist has you put on every seed artifact, so an out-of-date
# or wrong value here fails loudly rather than silently recording the
# wrong thing.

confluence:
  # docs/qa-environment-setup.md §10
  space_key: PFQA
  # Leave blank to resolve by title instead (one extra API call per run).
  # Fill in once known, to make --record faster and more precise.
  seed_page_id: ""
  seed_page_title: "PrivacyFence QA seed page [QATEST]"

jira:
  # docs/qa-environment-setup.md §9
  project_key: PFQA
  # Leave blank to resolve by a JQL summary search instead (one extra API
  # call per run). Fill in once known, to make --record faster and more
  # precise.
  seed_issue_key: ""
  seed_issue_summary: "PrivacyFence QA seed issue [QATEST]"

salesforce:
  # docs/qa-environment-setup.md §8 -- no separate seed artifact here,
  # unlike Confluence/Jira: the sample Account records that section
  # already has you create (tagged [QATEST]) are what the recorder
  # targets directly.
  report_name: "PrivacyFence QA Report"
  report_id: ""
  object_type: Account
  seed_record_name: "PrivacyFence QA — Acme Test Co [QATEST]"
  # Leave blank to resolve by search() on seed_record_name instead (one
  # extra API call per run).
  seed_record_id: ""

# Other connectors follow the same shape once
# scripts/qa_fixture_recorder.py grows a check_<connector>() for them --
# see that script's CONNECTOR_CHECKS registry and
# docs/external-api-contract-testing.md's Part A.
