name: Tests

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:   # allow manual runs from the Actions tab

permissions:
  contents: read

jobs:
  test:
    # macOS-only project (rumps/PyObjC, real Unix-socket/osascript-backed
    # tests) — must run on the same platform the app actually ships for.
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: pip install -e ".[test]"

      - name: Install bridge dependencies
        run: npm ci
        working-directory: bridge

      # bridge/'s own suite (IPC framing, error propagation, tool dispatch —
      # see docs/testing-policy.md) runs against bridge/src/*.ts directly via
      # tsx, no build step needed. Node's built-in test runner already fails
      # the step on the first failing test.
      - name: Run bridge test suite
        run: npm test
        working-directory: bridge

      # tests/integration/test_bridge_daemon_contract.py spawns the real
      # built bridge.js against a real IPCServer, so the bridge needs to be
      # built before pytest runs (the test builds it lazily on a cache miss
      # too, but building here keeps that cost out of the timed test step
      # and fails fast on a build error instead of a confusing test skip).
      - name: Build bridge
        run: npm run build
        working-directory: bridge

      # Plain `pytest` already fails the step (non-zero exit) on the first
      # failing test — no extra flags needed to enforce a 100% pass rate.
      # pytest-timeout (configured in pyproject.toml) also fails any test
      # that hangs, so a stuck test can't stall the job indefinitely. The
      # coverage report here is informational only — nothing gates on it.
      - name: Run test suite (100% pass rate required)
        run: pytest -v --cov=src/privacyfence --cov-report=term-missing
